<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Echo Sounder: Grid Escape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #001a2e, #000);
            font-family: 'Arial', sans-serif; color: #4dd0e1;
            touch-action: none;
        }
        .container { text-align: center; padding: 10px; }
        h1 {
            color: #4dd0e1; margin-bottom: 8px; font-size: 1.8em;
            letter-spacing: 4px; text-shadow: 0 0 20px #4dd0e1;
        }
        .info { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 10px; font-size: 0.95em; flex-wrap: wrap; }
        .info span { color: #fff; font-weight: bold; }
        canvas {
            border: 2px solid #4dd0e1; border-radius: 8px;
            background: #000;
            box-shadow: 0 0 40px #4dd0e166;
            cursor: crosshair; max-width: 100%; height: auto;
            touch-action: none;
        }
        .btn {
            margin: 5px; padding: 10px 22px;
            background: #006978; color: #4dd0e1;
            border: 1px solid #4dd0e1; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }
        .btn:hover, .btn:active { background: #4dd0e1; color: #000; }
        .hint { color: #4dd0e1aa; margin-top: 8px; font-size: 0.85em; padding: 0 10px; }
        
        /* Mobile D-pad */
        .dpad {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 15px auto 0;
            width: 190px;
        }
        .dpad button {
            background: rgba(77, 208, 225, 0.2);
            border: 1px solid #4dd0e1;
            border-radius: 10px;
            color: #4dd0e1;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        .dpad button:active { background: #4dd0e1; color: #000; }
        .dpad .empty { background: transparent; border: none; }
        @media (max-width: 768px) {
            .dpad { display: grid; }
        }
        .level-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3em; font-weight: bold; color: #4dd0e1;
            pointer-events: none; opacity: 0; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 ECHO SOUNDER</h1>
        <div class="info">
            <div>Lv: <span id="level">1</span></div>
            <div>Pings: <span id="pings">0</span></div>
            <div>Moves: <span id="moves">0</span></div>
            <div>Best: <span id="best">1</span></div>
        </div>
        <canvas id="game" width="500" height="500"></canvas>
        <p class="hint">🎯 TAP for sonar · ARROW KEYS / D-PAD to move · Reach green exit</p>
        <div class="dpad">
            <button class="empty"></button>
            <button onclick="moveSub(0, -1)">⬆️</button>
            <button class="empty"></button>
            <button onclick="moveSub(-1, 0)">⬅️</button>
            <button class="empty"></button>
            <button onclick="moveSub(1, 0)">➡️</button>
            <button class="empty"></button>
            <button onclick="moveSub(0, 1)">⬇️</button>
            <button class="empty"></button>
        </div>
        <button class="btn" onclick="restart()">New Maze</button>
        <button class="btn" onclick="toggleSound()">🔊 <span id="sndStatus">ON</span></button>
    </div>
    <div class="level-banner" id="banner"></div>
    <script>
        // ===== Audio =====
        const sfx = (() => {
            let ctx, enabled = true;
            const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
            const tone = (freq, dur, type='sine', vol=0.12) => {
                if (!enabled) return;
                init();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(), g = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.connect(g).connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + dur);
            };
            return {
                toggle: () => enabled = !enabled,
                isOn: () => enabled,
                ping: () => tone(800, 0.5, 'sine', 0.1),
                step: () => tone(300, 0.05, 'square', 0.08),
                bump: () => tone(120, 0.15, 'sawtooth', 0.12),
                win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.2), i * 80)); }
            };
        })();
        function toggleSound() {
            sfx.toggle();
            document.getElementById('sndStatus').textContent = sfx.isOn() ? 'ON' : 'OFF';
        }

        // ===== Game =====
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const banner = document.getElementById('banner');

        let level = parseInt(localStorage.getItem('es_level') || '1');
        let bestLevel = parseInt(localStorage.getItem('es_best') || '1');
        document.getElementById('best').textContent = bestLevel;

        let GRID, CELL;
        let maze, sub, exitPos, sonars, pings, moves, won, lastTime = 0;

        function showBanner(text, color = '#4dd0e1') {
            banner.textContent = text;
            banner.style.color = color;
            banner.style.textShadow = `0 0 30px ${color}`;
            gsap.fromTo(banner, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(2)' });
            gsap.to(banner, { opacity: 0, duration: 0.5, delay: 1.2 });
        }

        function genMaze() {
            const m = Array(GRID).fill().map(() => Array(GRID).fill(1));
            function carve(x, y) {
                m[y][x] = 0;
                const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
                for (const [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && m[ny][nx] === 1) {
                        m[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            return m;
        }

        function init() {
            // Level scales grid size: 10, 12, 14, 16...
            GRID = Math.min(20, 10 + Math.floor((level - 1) / 1) * 2);
            if (GRID % 2 === 0) GRID++;
            CELL = W / GRID;
            
            maze = genMaze();
            sub = { x: 1, y: 1 };
            // Place exit far corner
            exitPos = { x: GRID - 2, y: GRID - 2 };
            while (maze[exitPos.y][exitPos.x] === 1) exitPos.x = Math.max(1, exitPos.x - 1);
            
            sonars = [];
            pings = 0; moves = 0; won = false;
            updateUI();
            setTimeout(() => emitSonar(sub.x * CELL + CELL/2, sub.y * CELL + CELL/2, true), 300);
            showBanner(`LEVEL ${level}`);
        }
        init();

        function emitSonar(x, y, free) {
            sonars.push({ x, y, r: 0, maxR: Math.max(280, GRID * CELL * 0.7), life: 1 });
            if (!free) { pings++; sfx.ping(); }
            updateUI();
        }

        function clickAt(x, y) {
            if (won) return;
            emitSonar(x, y);
        }

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            clickAt((e.clientX - rect.left) * (W / rect.width), (e.clientY - rect.top) * (H / rect.height));
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            clickAt((t.clientX - rect.left) * (W / rect.width), (t.clientY - rect.top) * (H / rect.height));
        }, { passive: false });

        function moveSub(dx, dy) {
            if (won) return;
            const nx = sub.x + dx, ny = sub.y + dy;
            if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return;
            
            if (maze[ny][nx] === 1) {
                gsap.fromTo(canvas, { x: -8 }, { x: 0, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
                emitSonar(nx * CELL + CELL/2, ny * CELL + CELL/2, true);
                sfx.bump();
                return;
            }
            
            sub.x = nx; sub.y = ny;
            moves++;
            sfx.step();
            
            if (sub.x === exitPos.x && sub.y === exitPos.y) {
                won = true;
                emitSonar(sub.x * CELL + CELL/2, sub.y * CELL + CELL/2, true);
                sfx.win();
                gsap.to(canvas, { scale: 1.05, duration: 0.3, yoyo: true, repeat: 2 });
                level++;
                if (level > bestLevel) {
                    bestLevel = level;
                    localStorage.setItem('es_best', bestLevel);
                    document.getElementById('best').textContent = bestLevel;
                }
                localStorage.setItem('es_level', level);
                showBanner('ESCAPED!', '#69f0ae');
                setTimeout(() => init(), 2000);
            }
            updateUI();
        }
        window.moveSub = moveSub;

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') moveSub(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') moveSub(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveSub(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveSub(1, 0);
        });

        function updateUI() {
            document.getElementById('pings').textContent = pings;
            document.getElementById('moves').textContent = moves;
            document.getElementById('level').textContent = level;
        }

        function update(dt) {
            sonars.forEach(s => {
                s.r += 320 * dt;
                s.life = Math.max(0, 1 - s.r / s.maxR);
            });
            sonars = sonars.filter(s => s.life > 0);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            for (let y = 0; y < GRID; y++) {
                for (let x = 0; x < GRID; x++) {
                    if (maze[y][x] !== 1) continue;
                    const cx = x * CELL + CELL/2;
                    const cy = y * CELL + CELL/2;
                    
                    let maxAlpha = 0;
                    sonars.forEach(s => {
                        const dx = cx - s.x, dy = cy - s.y;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        const dist = Math.abs(d - s.r);
                        if (dist < 60) {
                            const a = (1 - dist / 60) * s.life;
                            if (a > maxAlpha) maxAlpha = a;
                        }
                    });
                    
                    if (maxAlpha > 0.02) {
                        ctx.fillStyle = `rgba(77, 208, 225, ${maxAlpha})`;
                        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${maxAlpha * 0.6})`;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
                    }
                }
            }

            sonars.forEach(s => {
                ctx.strokeStyle = `rgba(77, 208, 225, ${s.life * 0.7})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.stroke();
            });

            const ex = exitPos.x * CELL + CELL/2;
            const ey = exitPos.y * CELL + CELL/2;
            const pulse = 0.3 + Math.sin(Date.now() / 300) * 0.2;
            ctx.fillStyle = `rgba(105, 240, 174, ${pulse * 0.5})`;
            ctx.beginPath();
            ctx.arc(ex, ey, CELL * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = `rgba(105, 240, 174, ${pulse + 0.4})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            const sx = sub.x * CELL + CELL/2;
            const sy = sub.y * CELL + CELL/2;
            ctx.shadowColor = '#ffd54f';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffd54f';
            ctx.beginPath();
            ctx.arc(sx, sy, CELL * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(sx, sy, CELL * 0.12, 0, Math.PI * 2);
            ctx.fill();
            
            const lightGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, CELL * 1.5);
            lightGrad.addColorStop(0, 'rgba(255, 213, 79, 0.3)');
            lightGrad.addColorStop(1, 'rgba(255, 213, 79, 0)');
            ctx.fillStyle = lightGrad;
            ctx.beginPath();
            ctx.arc(sx, sy, CELL * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop(t) {
            const dt = Math.min((t - lastTime) / 1000, 0.05);
            lastTime = t;
            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        function restart() { init(); }
        requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
    </script>
</body>
</html>
