<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chain Reactor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0033, #0a0014);
            font-family: 'Arial', sans-serif; color: white;
            touch-action: none;
        }
        .container { text-align: center; padding: 10px; }
        h1 {
            font-size: 1.8em; margin-bottom: 8px; letter-spacing: 4px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }
        .info { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 10px; font-size: 0.95em; flex-wrap: wrap; }
        .info span { font-weight: bold; }
        canvas {
            border: 2px solid #ff00ff; border-radius: 12px;
            background: #000;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.4);
            cursor: crosshair; max-width: 100%; height: auto;
            touch-action: none;
        }
        .btn {
            margin: 5px; padding: 10px 22px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: #000; border: none; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 1em;
        }
        .hint { color: #aaa; margin-top: 8px; font-size: 0.85em; padding: 0 10px; }
        .level-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3em; font-weight: bold; color: #ffd54f;
            pointer-events: none; opacity: 0; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💥 CHAIN REACTOR</h1>
        <div class="info">
            <div>Lv: <span id="level" style="color:#ff00ff">1</span></div>
            <div>Score: <span id="score" style="color:#ffd54f">0</span></div>
            <div>Chain: <span id="chain" style="color:#00ffff">0</span></div>
            <div>Target: <span id="target" style="color:#69f0ae">10</span></div>
            <div>Shots: <span id="shots" style="color:#ff8a65">3</span></div>
        </div>
        <canvas id="game" width="600" height="600"></canvas>
        <p class="hint">🎯 CLICK / TAP empty space to detonate · Trigger chain reactions to clear targets</p>
        <button class="btn" onclick="restart()">Reset Level</button>
        <button class="btn" onclick="toggleSound()">🔊 <span id="sndStatus">ON</span></button>
    </div>
    <div class="level-banner" id="banner"></div>
    <script>
        // ===== Audio =====
        const sfx = (() => {
            let ctx, enabled = true;
            const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
            const tone = (freq, dur, type='sine', vol=0.12) => {
                if (!enabled) return;
                init();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(), g = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.connect(g).connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + dur);
            };
            return {
                toggle: () => enabled = !enabled,
                isOn: () => enabled,
                pop: (n) => tone(300 + n * 50, 0.1, 'square', 0.1),
                detonate: () => tone(150, 0.3, 'sawtooth', 0.15),
                win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.2), i * 80)); },
                fail: () => tone(100, 0.5, 'sawtooth', 0.15)
            };
        })();
        function toggleSound() {
            sfx.toggle();
            document.getElementById('sndStatus').textContent = sfx.isOn() ? 'ON' : 'OFF';
        }

        // ===== Game =====
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const banner = document.getElementById('banner');

        let level = parseInt(localStorage.getItem('cr_level') || '1');
        let particles, dots, explosions, chains;
        let score = 0, currentChain = 0, shotsLeft = 3, targetCount = 10, lastTime = 0;
        let levelComplete = false, levelFailed = false;

        function showBanner(text, color = '#ffd54f') {
            banner.textContent = text;
            banner.style.color = color;
            banner.style.textShadow = `0 0 30px ${color}`;
            gsap.fromTo(banner, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(2)' });
            gsap.to(banner, { opacity: 0, duration: 0.5, delay: 1.2 });
        }

        function init() {
            // Level scaling
            const dotCount = 15 + level * 3;
            shotsLeft = Math.max(1, 4 - Math.floor(level / 3));
            targetCount = Math.floor(dotCount * (0.5 + Math.min(0.4, level * 0.04)));
            
            dots = [];
            explosions = [];
            chains = [];
            score = 0;
            currentChain = 0;
            levelComplete = false;
            levelFailed = false;

            const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff5252', '#69f0ae'];
            for (let i = 0; i < dotCount; i++) {
                const speed = 30 + level * 5 + Math.random() * 30;
                const angle = Math.random() * Math.PI * 2;
                dots.push({
                    x: 50 + Math.random() * (W - 100),
                    y: 50 + Math.random() * (H - 100),
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: 12,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    pulsePhase: Math.random() * Math.PI * 2,
                    triggered: false,
                    chained: false
                });
            }

            updateUI();
            showBanner(`LEVEL ${level}`, '#ff00ff');
        }
        init();

        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('chain').textContent = currentChain;
            document.getElementById('target').textContent = targetCount;
            document.getElementById('shots').textContent = shotsLeft;
        }

        function detonate(x, y, radius = 70, color = '#ffd54f', isChain = false) {
            explosions.push({ x, y, r: 0, maxR: radius, life: 1, color });
            sfx.detonate();
            if (!isChain) sfx.pop(0);
        }

        function handleClick(x, y) {
            if (levelComplete || levelFailed) return;
            // Check if clicking on an existing dot — should miss (only empty space allowed)
            for (const d of dots) {
                if (d.triggered) continue;
                const dx = x - d.x, dy = y - d.y;
                if (Math.sqrt(dx*dx + dy*dy) < d.r * 1.5) return; // Tap too close to dot
            }
            
            if (shotsLeft <= 0) return;
            shotsLeft--;
            currentChain = 0;
            
            // Initial detonation
            chains.push({ x, y, radius: 70, delay: 0 });
            updateUI();
        }

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            handleClick(
                (e.clientX - rect.left) * (W / rect.width),
                (e.clientY - rect.top) * (H / rect.height)
            );
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            handleClick(
                (t.clientX - rect.left) * (W / rect.width),
                (t.clientY - rect.top) * (H / rect.height)
            );
        }, { passive: false });

        function update(dt) {
            // Process pending chains
            chains.forEach(c => c.delay -= dt);
            const ready = chains.filter(c => c.delay <= 0);
            ready.forEach(c => {
                detonate(c.x, c.y, c.radius, '#ffd54f', currentChain > 0);
                // Trigger nearby dots
                dots.forEach(d => {
                    if (d.triggered) return;
                    const dx = d.x - c.x, dy = d.y - c.y;
                    if (Math.sqrt(dx*dx + dy*dy) < c.radius + d.r) {
                        d.triggered = true;
                        d.chained = currentChain > 0;
                        currentChain++;
                        const points = 10 * Math.min(20, currentChain);
                        score += points;
                        sfx.pop(currentChain);
                        // Burst
                        for (let i = 0; i < 15; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const sp = 100 + Math.random() * 250;
                            particles = particles || [];
                            particles.push({
                                x: d.x, y: d.y,
                                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                                life: 1, color: d.color, size: 3
                            });
                        }
                        // Schedule next chain
                        chains.push({ x: d.x, y: d.y, radius: 80, delay: 0.15 });
                    }
                });
            });
            chains = chains.filter(c => c.delay > 0);

            // Move dots
            dots.forEach(d => {
                if (d.triggered) return;
                d.x += d.vx * dt;
                d.y += d.vy * dt;
                d.pulsePhase += dt * 4;
                if (d.x < d.r || d.x > W - d.r) d.vx *= -1;
                if (d.y < d.r || d.y > H - d.r) d.vy *= -1;
                d.x = Math.max(d.r, Math.min(W - d.r, d.x));
                d.y = Math.max(d.r, Math.min(H - d.r, d.y));
            });

            // Explosions
            explosions.forEach(e => {
                e.r += (e.maxR - e.r) * 0.3;
                e.life -= dt * 2;
            });
            explosions = explosions.filter(e => e.life > 0);

            // Particles
            particles = particles || [];
            particles.forEach(p => {
                p.x += p.vx * dt; p.y += p.vy * dt;
                p.vx *= 0.95; p.vy *= 0.95;
                p.life -= dt * 1.5;
            });
            particles = particles.filter(p => p.life > 0);

            // Check level state once chains are done
            if (chains.length === 0 && !levelComplete && !levelFailed) {
                const triggeredCount = dots.filter(d => d.triggered).length;
                if (triggeredCount >= targetCount) {
                    levelComplete = true;
                    sfx.win();
                    level++;
                    localStorage.setItem('cr_level', level);
                    showBanner('LEVEL UP!', '#69f0ae');
                    setTimeout(() => init(), 2000);
                } else if (shotsLeft <= 0 && currentChain === 0) {
                    levelFailed = true;
                    sfx.fail();
                    showBanner('FAILED', '#ff5252');
                    setTimeout(() => init(), 2000);
                }
            }

            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            // Grid background
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 30, 0); ctx.lineTo(i * 30, H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * 30); ctx.lineTo(W, i * 30);
                ctx.stroke();
            }

            // Explosions
            explosions.forEach(e => {
                const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
                grad.addColorStop(0, `rgba(255, 255, 255, ${e.life})`);
                grad.addColorStop(0.5, `rgba(255, 213, 79, ${e.life * 0.6})`);
                grad.addColorStop(1, `rgba(255, 0, 255, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = `rgba(255, 213, 79, ${e.life})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.stroke();
            });

            // Dots
            dots.forEach(d => {
                if (d.triggered) return;
                const pulse = 1 + Math.sin(d.pulsePhase) * 0.15;
                ctx.shadowColor = d.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = d.color;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(d.x - d.r/3, d.y - d.r/3, d.r/3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Particles
            (particles || []).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            // HUD bar (target progress)
            const triggered = dots.filter(d => d.triggered).length;
            const progress = Math.min(1, triggered / targetCount);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(20, 20, W - 40, 6);
            ctx.fillStyle = progress >= 1 ? '#69f0ae' : '#00ffff';
            ctx.fillRect(20, 20, (W - 40) * progress, 6);
        }

        function loop(t) {
            const dt = Math.min((t - lastTime) / 1000, 0.05);
            lastTime = t;
            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        function restart() { init(); }
        requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
    </script>
</body>
</html>
