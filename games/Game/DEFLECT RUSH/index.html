<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gravity Bounce: Deflect Rush</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1f;
            font-family: 'Arial', sans-serif; color: white;
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 {
            margin-bottom: 10px; font-size: 2em;
            background: linear-gradient(90deg, #ff5252, #448aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .info { display: flex; justify-content: space-around; margin-bottom: 12px; font-size: 1em; }
        .info span { font-weight: bold; }
        canvas {
            border: 2px solid #fff; border-radius: 50%;
            background: radial-gradient(circle, #1a1a3a, #000);
            cursor: none;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
        }
        .btn {
            margin-top: 12px; padding: 10px 25px;
            background: #fff; color: #0a0a1f;
            border: none; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }
        .btn:hover { background: #ddd; }
        .hint { color: #888; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ DEFLECT RUSH</h1>
        <div class="info">
            <div>Score: <span id="score" style="color:#ffd54f">0</span></div>
            <div>Combo: x<span id="combo" style="color:#ff80ab">1</span></div>
            <div>Lives: <span id="lives" style="color:#ff5252">3</span></div>
        </div>
        <canvas id="game" width="600" height="600"></canvas>
        <p class="hint">🖱️ MOVE mouse to rotate shield · Match colors: RED→RED, BLUE→BLUE</p>
        <button class="btn" onclick="restart()">Restart</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const CX = W/2, CY = H/2;
        const CORE_R = 30;
        const SHIELD_R = 80;
        const SHIELD_ARC = Math.PI * 0.4; // 72 degrees

        let shieldAngle = 0;
        let projectiles = [];
        let towers = [];
        let particles = [];
        let score = 0, combo = 1, lives = 3;
        let gameOver = false, lastTime = 0;
        let spawnTimer = 0, ringTimer = 0;
        let rings = [];

        function init() {
            shieldAngle = 0;
            projectiles = [];
            particles = [];
            rings = [];
            score = 0; combo = 1; lives = 3;
            gameOver = false;
            spawnTimer = 0;
            
            // 6 towers around the arena
            towers = [];
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                towers.push({
                    angle: a,
                    x: CX + Math.cos(a) * 270,
                    y: CY + Math.sin(a) * 270,
                    color: i % 2 === 0 ? 'red' : 'blue',
                    cooldown: Math.random() * 2
                });
            }
            updateUI();
            gsap.fromTo('h1', { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.7)' });
        }
        init();

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (W / rect.width);
            const my = (e.clientY - rect.top) * (H / rect.height);
            shieldAngle = Math.atan2(my - CY, mx - CX);
        });

        function spawnProjectile() {
            // Pick random tower
            const t = towers[Math.floor(Math.random() * towers.length)];
            const dx = CX - t.x, dy = CY - t.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            const speed = 180;
            projectiles.push({
                x: t.x, y: t.y,
                vx: (dx / d) * speed,
                vy: (dy / d) * speed,
                color: t.color,
                deflected: false,
                fromTower: t,
                trail: []
            });
        }

        function explode(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = 100 + Math.random() * 250;
                particles.push({
                    x, y,
                    vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                    life: 1, color, size: 2 + Math.random() * 3
                });
            }
        }

        function update(dt) {
            if (gameOver) {
                particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
                particles = particles.filter(p => p.life > 0);
                return;
            }

            // Spawn projectiles - faster as score increases
            spawnTimer += dt;
            const interval = Math.max(0.4, 1.5 - score * 0.005);
            if (spawnTimer >= interval) {
                spawnTimer = 0;
                spawnProjectile();
            }

            // Energy rings emanating from core
            ringTimer += dt;
            if (ringTimer > 1.2) {
                ringTimer = 0;
                rings.push({ r: 0, life: 1 });
            }
            rings.forEach(r => { r.r += 60 * dt; r.life -= dt * 0.5; });
            rings = rings.filter(r => r.life > 0);

            // Update projectiles
            projectiles.forEach(p => {
                p.trail.push({ x: p.x, y: p.y });
                if (p.trail.length > 8) p.trail.shift();
                p.x += p.vx * dt;
                p.y += p.vy * dt;

                if (!p.deflected) {
                    // Distance from center
                    const dx = p.x - CX, dy = p.y - CY;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    
                    // Check shield collision
                    if (d <= SHIELD_R + 8 && d >= SHIELD_R - 8) {
                        const projAngle = Math.atan2(dy, dx);
                        let angleDiff = Math.abs(((projAngle - shieldAngle) + Math.PI) % (Math.PI * 2) - Math.PI);
                        if (angleDiff < SHIELD_ARC / 2) {
                            // Deflect!
                            const normalAngle = projAngle;
                            const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy) * 1.3;
                            p.vx = Math.cos(normalAngle) * speed;
                            p.vy = Math.sin(normalAngle) * speed;
                            p.deflected = true;
                            explode(p.x, p.y, p.color === 'red' ? '#ff5252' : '#448aff', 8);
                            gsap.fromTo(canvas, { scale: 1.02 }, { scale: 1, duration: 0.3, ease: 'elastic.out(1, 0.4)' });
                        }
                    }
                    // Hit core
                    if (d < CORE_R) {
                        explode(CX, CY, '#fff', 30);
                        lives--;
                        combo = 1;
                        p.life = 0;
                        p.dead = true;
                        gsap.fromTo(canvas, { x: -10 }, { x: 0, duration: 0.5, ease: 'elastic.out(1, 0.3)' });
                        if (lives <= 0) gameOver = true;
                    }
                } else {
                    // Check tower hit
                    towers.forEach(t => {
                        const dx = p.x - t.x, dy = p.y - t.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 25) {
                            if (t.color === p.color) {
                                score += 10 * combo;
                                combo++;
                            } else {
                                score = Math.max(0, score - 5);
                                combo = 1;
                            }
                            explode(t.x, t.y, t.color === 'red' ? '#ff5252' : '#448aff', 25);
                            p.life = 0;
                            p.dead = true;
                            // Tower flash
                            gsap.fromTo(t, { scale: 1.3 }, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.4)' });
                        }
                    });
                }

                // Off screen
                if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) p.dead = true;
            });
            projectiles = projectiles.filter(p => !p.dead);

            particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
            particles = particles.filter(p => p.life > 0);

            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, W, H);

            // Background grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.arc(CX, CY, 50 + i * 25, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Energy rings
            rings.forEach(r => {
                ctx.strokeStyle = `rgba(255,255,255,${r.life * 0.4})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(CX, CY, r.r, 0, Math.PI * 2);
                ctx.stroke();
            });

            // Towers
            towers.forEach(t => {
                const sc = t.scale || 1;
                const c = t.color === 'red' ? '#ff5252' : '#448aff';
                ctx.shadowColor = c;
                ctx.shadowBlur = 20;
                ctx.fillStyle = c;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 22 * sc, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(t.x, t.y, 8 * sc, 0, Math.PI * 2);
                ctx.fill();
            });

            // Projectiles trails
            projectiles.forEach(p => {
                p.trail.forEach((t, i) => {
                    const alpha = (i / p.trail.length) * 0.6;
                    ctx.fillStyle = p.color === 'red' ? `rgba(255, 82, 82, ${alpha})` : `rgba(68, 138, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 5 * (i / p.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                });
            });

            // Projectiles
            projectiles.forEach(p => {
                const c = p.color === 'red' ? '#ff5252' : '#448aff';
                ctx.shadowColor = c;
                ctx.shadowBlur = 15;
                ctx.fillStyle = c;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Shield arc
            ctx.save();
            ctx.translate(CX, CY);
            ctx.rotate(shieldAngle);
            const shieldGrad = ctx.createLinearGradient(SHIELD_R, 0, SHIELD_R + 20, 0);
            shieldGrad.addColorStop(0, '#fff');
            shieldGrad.addColorStop(1, '#fff0');
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 8;
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(0, 0, SHIELD_R, -SHIELD_ARC/2, SHIELD_ARC/2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();

            // Core
            const coreGrad = ctx.createRadialGradient(CX, CY, 5, CX, CY, CORE_R);
            coreGrad.addColorStop(0, '#fff');
            coreGrad.addColorStop(0.5, '#ffd54f');
            coreGrad.addColorStop(1, '#ff6b00');
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(CX, CY, CORE_R, 0, Math.PI * 2);
            ctx.fill();
            
            // Pulse ring
            const pulse = 1 + Math.sin(Date.now() / 200) * 0.1;
            ctx.strokeStyle = '#ffd54f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(CX, CY, CORE_R * pulse, 0, Math.PI * 2);
            ctx.stroke();

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff5252';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CX, CY - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText(`Score: ${score}`, CX, CY + 20);
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('lives').textContent = lives;
        }

        function loop(t) {
            const dt = Math.min((t - lastTime) / 1000, 0.05);
            lastTime = t;
            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        function restart() { init(); }
        requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
    </script>
</body>
</html>
