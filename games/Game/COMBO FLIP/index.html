<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Flip: Numeric Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #2c3e50, #1a252f);
            font-family: 'Arial', sans-serif; color: white;
            padding: 15px;
        }
        .container { text-align: center; max-width: 100%; }
        h1 {
            color: #ffd54f; margin-bottom: 8px; font-size: 1.8em;
            letter-spacing: 3px; text-shadow: 0 0 15px #ffd54f;
        }
        .info { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 12px; font-size: 0.95em; flex-wrap: wrap; }
        .info span { font-weight: bold; }
        .scoreboard { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .player-score, .enemy-score { padding: 8px 18px; border-radius: 10px; font-weight: bold; }
        .player-score { background: #1e88e5; }
        .enemy-score { background: #e53935; }
        .arena { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        #board {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 5px;
            background: #1a252f;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cell {
            width: 70px; height: 70px;
            background: #34495e;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold;
            cursor: pointer;
        }
        .cell:hover:empty { background: #4a6376; }
        .cell.player { background: #1e88e5; }
        .cell.enemy { background: #e53935; }
        .cell.placeable { box-shadow: inset 0 0 0 2px #ffd54f; }
        .hand { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .tile {
            width: 60px; height: 60px;
            background: #1e88e5;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .tile.selected { transform: scale(1.1); box-shadow: 0 0 15px #ffd54f, 0 4px 8px rgba(0,0,0,0.3); }
        .tile.disabled { opacity: 0.4; cursor: not-allowed; }
        .turn-info { margin-top: 10px; font-size: 1em; font-weight: bold; min-height: 25px; }
        .btn {
            margin: 5px; padding: 10px 22px;
            background: #ffd54f; color: #1a252f;
            border: none; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }
        @media (max-width: 600px) {
            #board { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(4, 60px); }
            .cell { width: 60px; height: 60px; font-size: 22px; }
            .tile { width: 50px; height: 50px; font-size: 20px; }
        }
        .level-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3em; font-weight: bold; pointer-events: none; opacity: 0; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 COMBO FLIP</h1>
        <div class="info">
            <div>Lv: <span id="level" style="color:#ffd54f">1</span></div>
            <div>Best: <span id="best" style="color:#69f0ae">1</span></div>
            <button class="btn" style="padding:5px 15px; font-size:0.85em" onclick="toggleSound()">🔊 <span id="sndStatus">ON</span></button>
        </div>
        <div class="scoreboard">
            <div class="player-score">YOU: <span id="pscore">0</span></div>
            <div class="enemy-score">AI: <span id="ascore">0</span></div>
        </div>
        <div class="arena">
            <div class="hand" id="phand"></div>
            <div id="board"></div>
            <div class="hand" id="ahand"></div>
        </div>
        <div class="turn-info" id="turn">Your turn — pick a tile</div>
        <button class="btn" onclick="restart()">New Game</button>
    </div>
    <div class="level-banner" id="banner"></div>
    <script>
        const sfx = (() => {
            let ctx, enabled = true;
            const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
            const tone = (freq, dur, type='sine', vol=0.1) => {
                if (!enabled) return;
                init();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(), g = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.connect(g).connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + dur);
            };
            return {
                toggle: () => enabled = !enabled,
                isOn: () => enabled,
                place: () => tone(500, 0.08, 'square', 0.08),
                flip: () => tone(800, 0.15, 'sine', 0.1),
                win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.2), i * 80)); },
                lose: () => tone(150, 0.4, 'sawtooth', 0.12)
            };
        })();
        function toggleSound() {
            sfx.toggle();
            document.getElementById('sndStatus').textContent = sfx.isOn() ? 'ON' : 'OFF';
        }

        const SIZE = 4;
        const banner = document.getElementById('banner');
        let level = parseInt(localStorage.getItem('cf_level') || '1');
        let bestLevel = parseInt(localStorage.getItem('cf_best') || '1');
        document.getElementById('best').textContent = bestLevel;

        let board, phand, ahand, selectedTile, turn, gameEnd;

        const boardEl = document.getElementById('board');
        const phandEl = document.getElementById('phand');
        const ahandEl = document.getElementById('ahand');
        const turnEl = document.getElementById('turn');

        function showBanner(text, color = '#ffd54f') {
            banner.textContent = text;
            banner.style.color = color;
            banner.style.textShadow = `0 0 30px ${color}`;
            gsap.fromTo(banner, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(2)' });
            gsap.to(banner, { opacity: 0, duration: 0.5, delay: 1.2 });
        }

        // Higher level = AI gets bigger numbers in hand
        function randomTile(forAI = false) {
            const min = forAI ? Math.min(5, 1 + Math.floor(level / 3)) : 1;
            const max = 9;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function init() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
            phand = [randomTile(), randomTile(), randomTile()];
            ahand = [randomTile(true), randomTile(true), randomTile(true)];
            selectedTile = null;
            turn = 'player';
            gameEnd = false;
            render();
            turnEl.textContent = 'Your turn — pick a tile';
            document.getElementById('level').textContent = level;
            gsap.fromTo('.tile', { scale: 0, rotation: 180 }, { scale: 1, rotation: 0, duration: 0.5, stagger: 0.1, ease: 'back.out(1.7)' });
            showBanner(`LEVEL ${level}`);
        }

        function render() {
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    const t = board[r][c];
                    if (t) {
                        cell.classList.add(t.owner);
                        cell.textContent = t.value;
                    } else if (selectedTile !== null && turn === 'player') {
                        cell.classList.add('placeable');
                    }
                    cell.onclick = () => placeTile(r, c);
                    boardEl.appendChild(cell);
                }
            }

            phandEl.innerHTML = '<div style="font-size:0.85em;color:#aaa">YOU</div>';
            phand.forEach((v, i) => {
                const t = document.createElement('div');
                t.className = 'tile';
                t.style.background = '#1e88e5';
                if (selectedTile === i) t.classList.add('selected');
                if (turn !== 'player' || gameEnd) t.classList.add('disabled');
                t.textContent = v;
                t.onclick = () => {
                    if (turn !== 'player' || gameEnd) return;
                    selectedTile = (selectedTile === i) ? null : i;
                    render();
                };
                phandEl.appendChild(t);
            });

            ahandEl.innerHTML = '<div style="font-size:0.85em;color:#aaa">AI</div>';
            ahand.forEach(() => {
                const t = document.createElement('div');
                t.className = 'tile';
                t.style.background = '#e53935';
                t.textContent = '?';
                ahandEl.appendChild(t);
            });

            updateScore();
        }

        function getCellEl(r, c) {
            return boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
        }

        function placeTile(r, c) {
            if (gameEnd || turn !== 'player' || selectedTile === null) return;
            if (board[r][c]) return;
            
            const value = phand[selectedTile];
            board[r][c] = { value, owner: 'player' };
            phand.splice(selectedTile, 1);
            phand.push(randomTile());
            selectedTile = null;
            sfx.place();
            
            render();
            const el = getCellEl(r, c);
            gsap.fromTo(el, { scale: 0, rotation: 360 }, { scale: 1, rotation: 0, duration: 0.4, ease: 'back.out(2)' });
            
            setTimeout(() => {
                resolveFlips(r, c, 'player');
                if (isBoardFull()) {
                    finish();
                } else {
                    turn = 'ai';
                    turnEl.textContent = '🤖 AI is thinking...';
                    setTimeout(aiMove, 700);
                }
            }, 450);
        }

        function resolveFlips(r, c, owner) {
            const placed = board[r][c];
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            const flips = [];
            for (const [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
                const adj = board[nr][nc];
                if (adj && adj.owner !== owner && placed.value > adj.value) flips.push([nr, nc]);
            }
            flips.forEach(([nr, nc]) => {
                board[nr][nc].owner = owner;
                const el = getCellEl(nr, nc);
                if (el) {
                    sfx.flip();
                    gsap.to(el, {
                        rotationY: 180, duration: 0.5,
                        onComplete: () => {
                            gsap.set(el, { rotationY: 0 });
                            render();
                        }
                    });
                }
            });
            if (flips.length > 0) setTimeout(render, 550);
        }

        function aiMove() {
            // Stronger AI at higher levels (look-ahead)
            let best = null, bestScore = -Infinity;
            for (let i = 0; i < ahand.length; i++) {
                const value = ahand[i];
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c]) continue;
                        let score = 0;
                        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                        for (const [dr, dc] of dirs) {
                            const nr = r + dr, nc = c + dc;
                            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
                            const adj = board[nr][nc];
                            if (adj && adj.owner === 'player' && value > adj.value) score += 10;
                            // Higher level: avoid being flipped back
                            if (adj && adj.owner === 'player' && value < adj.value) score -= 3 - level * 0.5;
                        }
                        score -= (9 - value) * (0.5 + level * 0.1);
                        if (r === 0 || r === SIZE - 1) score += 1;
                        if (c === 0 || c === SIZE - 1) score += 1;
                        if (score > bestScore) { bestScore = score; best = { i, r, c, value }; }
                    }
                }
            }
            
            if (best) {
                board[best.r][best.c] = { value: best.value, owner: 'enemy' };
                ahand.splice(best.i, 1);
                ahand.push(randomTile(true));
                render();
                const el = getCellEl(best.r, best.c);
                if (el) gsap.fromTo(el, { scale: 0, rotation: 360 }, { scale: 1, rotation: 0, duration: 0.4, ease: 'back.out(2)' });
                sfx.place();
                
                setTimeout(() => {
                    resolveFlips(best.r, best.c, 'enemy');
                    if (isBoardFull()) {
                        finish();
                    } else {
                        turn = 'player';
                        turnEl.textContent = 'Your turn — pick a tile';
                    }
                }, 500);
            }
        }

        function isBoardFull() {
            return board.every(row => row.every(c => c !== null));
        }

        function updateScore() {
            let p = 0, a = 0;
            for (const row of board) for (const c of row) {
                if (c?.owner === 'player') p++;
                else if (c?.owner === 'enemy') a++;
            }
            document.getElementById('pscore').textContent = p;
            document.getElementById('ascore').textContent = a;
        }

        function finish() {
            gameEnd = true;
            updateScore();
            const p = parseInt(document.getElementById('pscore').textContent);
            const a = parseInt(document.getElementById('ascore').textContent);
            let msg = '';
            if (p > a) {
                msg = '🏆 You Win!';
                level++;
                if (level > bestLevel) {
                    bestLevel = level;
                    localStorage.setItem('cf_best', bestLevel);
                    document.getElementById('best').textContent = bestLevel;
                }
                localStorage.setItem('cf_level', level);
                sfx.win();
                showBanner('VICTORY!', '#69f0ae');
                setTimeout(() => init(), 2500);
            } else if (a > p) {
                msg = '💀 AI Wins!';
                level = Math.max(1, level - 1);
                localStorage.setItem('cf_level', level);
                sfx.lose();
                showBanner('DEFEATED', '#ff5252');
                setTimeout(() => init(), 2500);
            } else {
                msg = '🤝 Draw!';
                showBanner('DRAW', '#ccc');
                setTimeout(() => init(), 2500);
            }
            turnEl.textContent = msg;
            gsap.fromTo('.cell', { scale: 1 }, { scale: 1.05, duration: 0.3, yoyo: true, repeat: 1, stagger: 0.02 });
        }

        function restart() { init(); }
        init();
    </script>
</body>
</html>
